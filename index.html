<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>ejobtrack — Automatic Job Application Tracker</title>
    <meta
      name="description"
      content="Track your job applications automatically from Gmail. No backend, no data leaves your browser. Supports JobStreet, LinkedIn, Indeed."
    />

    <!-- Open Graph / Social sharing (LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ejobtrack.ralphabejuela.com" />
    <meta
      property="og:title"
      content="ejobtrack — Automatic Job Application Tracker"
    />
    <meta
      property="og:description"
      content="Track your job applications automatically from Gmail. No backend, no data leaves your browser."
    />
    <meta
      property="og:image"
      content="https://ejobtrack.ralphabejuela.com/og-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="ejobtrack — Automatic Job Application Tracker"
    />
    <meta
      name="twitter:description"
      content="Track your job applications automatically from Gmail. No backend, no data leaves your browser."
    />
    <meta
      name="twitter:image"
      content="https://ejobtrack.ralphabejuela.com/og-image.png"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Visible to Google's crawler without JS executing -->
    <noscript>
      <div
        style="
          padding: 2rem;
          max-width: 42rem;
          margin: 0 auto;
          text-align: center;
        "
      >
        <h1>ejobtrack</h1>
        <p style="font-size: 1.125rem">
          Track your job applications from Gmail
        </p>
        <p style="font-size: 0.875rem; line-height: 1.6">
          ejobtrack is a job application tracker that uses read-only Gmail
          access to detect and organize your application emails from job
          platforms. It processes everything locally in your browser. No data is
          sent to any server. Your email content stays private and never leaves
          your device.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center">
          <a href="/privacy">Privacy Policy</a>
          <a href="/terms">Terms of Service</a>
        </div>
      </div>
    </noscript>

    <script src="https://accounts.google.com/gsi/client" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
